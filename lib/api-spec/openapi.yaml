openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: LeonidaHub API — GTA V/GTA 6 RP server directory
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: servers
    description: RP server operations
  - name: reviews
    description: Review operations
  - name: emails
    description: Email capture
  - name: auth
    description: Authentication
  - name: subscribers
    description: Subscriber management
  - name: plans
    description: Plan management
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Login success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout user
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized

  /servers:
    get:
      operationId: listServers
      tags: [servers]
      summary: List all servers (paginated)
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: search
          in: query
          schema:
            type: string
        - name: style
          in: query
          schema:
            type: string
        - name: country
          in: query
          schema:
            type: string
        - name: allowlist
          in: query
          schema:
            type: string
        - name: level
          in: query
          schema:
            type: string
        - name: sort
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of servers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerListResponse"
    post:
      operationId: createServer
      tags: [servers]
      summary: Create a new server (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"

  /servers/top5:
    get:
      operationId: getTop5Servers
      tags: [servers]
      summary: Get top 5 servers (public)
      responses:
        "200":
          description: Top 5 servers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Server"

  /servers/stats:
    get:
      operationId: getServerStats
      tags: [servers]
      summary: Get global stats (server count, review count, waitlist count)
      responses:
        "200":
          description: Global stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalStats"

  /servers/{slug}:
    get:
      operationId: getServer
      tags: [servers]
      summary: Get server by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Server details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerDetail"
        "404":
          description: Not found
    put:
      operationId: updateServer
      tags: [servers]
      summary: Update server (admin only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ServerInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Server"
    delete:
      operationId: deleteServer
      tags: [servers]
      summary: Delete server (admin only)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /servers/{slug}/reviews:
    get:
      operationId: getServerReviews
      tags: [reviews]
      summary: Get reviews for a server
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Reviews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Submit a review
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /reviews/{id}/moderate:
    patch:
      operationId: moderateReview
      tags: [reviews]
      summary: Approve or reject a review (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ModerationInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  /emails/waitlist:
    post:
      operationId: joinWaitlist
      tags: [emails]
      summary: Join the GTA 6 waitlist
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmailInput"
      responses:
        "201":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailEntry"
    get:
      operationId: listEmails
      tags: [emails]
      summary: List all captured emails (admin only)
      responses:
        "200":
          description: Emails
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EmailEntry"

  /subscribers:
    get:
      operationId: listSubscribers
      tags: [subscribers]
      summary: List all subscribers (admin only)
      responses:
        "200":
          description: Subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Subscriber"

  /subscribers/{id}/plan:
    patch:
      operationId: updateSubscriberPlan
      tags: [subscribers]
      summary: Update subscriber plan (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"

  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List all plans and benefits
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
    put:
      operationId: updatePlan
      tags: [plans]
      summary: Update plan benefits (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Plan"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, email, role, plan]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        role:
          type: string
          enum: [visitor, cidadao, vip, fundador, admin]
        plan:
          type: string
          enum: [free, cidadao, vip, fundador]
        badge:
          type: ["string", "null"]
        xp:
          type: integer
        createdAt:
          type: string

    Server:
      type: object
      required: [id, name, slug, country, style, allowlist, rating, reviewCount, rank, badges, game]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: ["string", "null"]
        country:
          type: string
        style:
          type: string
        allowlist:
          type: boolean
        rating:
          type: number
        reviewCount:
          type: integer
        rank:
          type: integer
        rankChange:
          type: ["integer", "null"]
        trending:
          type: boolean
        featured:
          type: boolean
        level:
          type: string
          enum: [beginner, veteran, all]
        badges:
          type: array
          items:
            type: string
        game:
          type: string
          enum: [gtav, gta6]
        officialLink:
          type: ["string", "null"]
        discordLink:
          type: ["string", "null"]
        playerCount:
          type: ["integer", "null"]
        weeklyVisits:
          type: ["integer", "null"]

    ServerDetail:
      allOf:
        - $ref: "#/components/schemas/Server"
        - type: object
          properties:
            howToEnter:
              type: ["string", "null"]
            requirements:
              type: ["string", "null"]
            stats:
              type: object
              properties:
                visits:
                  type: integer
                clicks:
                  type: integer

    ServerListResponse:
      type: object
      required: [servers, total, page, limit]
      properties:
        servers:
          type: array
          items:
            $ref: "#/components/schemas/Server"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    ServerInput:
      type: object
      required: [name, slug, country, style, allowlist, level, game]
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        country:
          type: string
        style:
          type: string
        allowlist:
          type: boolean
        level:
          type: string
        badges:
          type: array
          items:
            type: string
        game:
          type: string
        officialLink:
          type: string
        discordLink:
          type: string
        featured:
          type: boolean

    Review:
      type: object
      required: [id, serverId, authorName, rating, comment, status, createdAt]
      properties:
        id:
          type: integer
        serverId:
          type: integer
        authorName:
          type: string
        authorEmail:
          type: string
        rating:
          type: integer
        comment:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected]
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [authorName, authorEmail, rating, comment]
      properties:
        authorName:
          type: string
        authorEmail:
          type: string
        rating:
          type: integer
        comment:
          type: string

    ModerationInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [approved, rejected]

    EmailInput:
      type: object
      required: [email]
      properties:
        email:
          type: string
        name:
          type: string

    EmailEntry:
      type: object
      required: [id, email, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        createdAt:
          type: string

    GlobalStats:
      type: object
      required: [serverCount, reviewCount, waitlistCount]
      properties:
        serverCount:
          type: integer
        reviewCount:
          type: integer
        waitlistCount:
          type: integer

    Subscriber:
      type: object
      required: [id, email, plan, active, createdAt]
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: ["string", "null"]
        plan:
          type: string
          enum: [free, cidadao, vip, fundador]
        active:
          type: boolean
        stripeCustomerId:
          type: ["string", "null"]
        createdAt:
          type: string

    PlanUpdate:
      type: object
      required: [plan]
      properties:
        plan:
          type: string
          enum: [free, cidadao, vip, fundador]
        active:
          type: boolean

    Plan:
      type: object
      required: [id, name, slug, priceMonthly, benefits]
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
          enum: [free, cidadao, vip, fundador]
        priceMonthly:
          type: number
        priceAnnual:
          type: ["number", "null"]
        annualEnabled:
          type: boolean
        popular:
          type: boolean
        benefits:
          type: array
          items:
            type: string
